<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Физика: Тренажёр (термин ↔ определение)</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Roboto', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .card {
            max-width: 850px;
            width: 100%;
            background: rgba(255,255,255,0.95);
            border-radius: 48px;
            padding: 30px 28px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
        }
        h1 { font-size: 1.8rem; margin: 0 0 5px 0; color: #0f172a; }
        .sub { color: #334155; border-left: 3px solid #3b82f6; padding-left: 14px; margin-bottom: 20px; font-weight: 500; }
        
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
            justify-content: space-between;
            align-items: center;
            background: #f1f5f9;
            padding: 12px 20px;
            border-radius: 60px;
        }
        .mode-switch {
            display: flex;
            gap: 8px;
            background: #e2e8f0;
            padding: 4px;
            border-radius: 40px;
        }
        .mode-btn {
            border: none;
            padding: 6px 18px;
            border-radius: 32px;
            font-weight: 600;
            cursor: pointer;
            background: transparent;
            transition: 0.2s;
        }
        .mode-btn.active {
            background: #3b82f6;
            color: white;
        }
        .topic-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
            background: #f8fafc;
            padding: 10px 16px;
            border-radius: 50px;
        }
        .topic-btn {
            background: #e2e8f0;
            border: none;
            padding: 6px 16px;
            border-radius: 32px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.85rem;
        }
        .topic-btn.active {
            background: #3b82f6;
            color: white;
        }
        .question-panel {
            background: #f8fafc;
            border-radius: 32px;
            padding: 30px 24px;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
        }
        .question-text {
            font-size: 1.5rem;
            font-weight: 600;
            line-height: 1.4;
            color: #0f172a;
            background: white;
            padding: 24px;
            border-radius: 28px;
            margin-bottom: 25px;
            text-align: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }
        input {
            width: 100%;
            padding: 16px 20px;
            font-size: 1rem;
            border: 2px solid #cbd5e1;
            border-radius: 48px;
            outline: none;
        }
        input:focus { border-color: #3b82f6; }
        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        button {
            background: #1e293b;
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
        }
        button.primary { background: #3b82f6; }
        .result {
            margin-top: 20px;
            background: #eef2ff;
            border-radius: 28px;
            padding: 20px;
            text-align: center;
        }
        .score { font-size: 2rem; font-weight: 800; color: #3b82f6; }
        .accuracy-bar {
            background: #cbd5e1;
            border-radius: 40px;
            height: 10px;
            margin: 10px 0;
        }
        .fill-bar {
            background: #3b82f6;
            width: 0%;
            height: 100%;
            border-radius: 40px;
        }
        .feedback { font-weight: 500; margin-top: 12px; }
        .correct-feedback { color: #15803d; }
        .wrong-feedback { color: #b91c1c; }
        .stats {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            font-size: 0.9rem;
        }
        footer { font-size: 0.7rem; text-align: center; margin-top: 25px; color: #64748b; }
        @media (max-width: 550px) {
            .question-text { font-size: 1.1rem; }
        }
    </style>
</head>
<body>
<div class="card">
    <h1>📚 Физика: тренажёр</h1>
    <div class="sub">Термин ↔ Определение • случайный выбор</div>

    <div class="controls">
        <div class="mode-switch" id="modeSwitch">
            <button class="mode-btn active" data-mode="def_to_term">📖 Определение → Термин</button>
            <button class="mode-btn" data-mode="term_to_def">📝 Термин → Определение</button>
        </div>
        <button id="shuffleBtn" style="background:#475569">🔄 Вперемешку</button>
    </div>

    <div class="topic-selector" id="topicSelector"></div>

    <div class="question-panel">
        <div class="question-text" id="questionText">Загрузка...</div>
        <input type="text" id="answerInput" placeholder="Ваш ответ..." autocomplete="off">
        <div class="button-group">
            <button class="primary" id="checkBtn">✅ Проверить</button>
            <button id="nextBtn">🎲 Следующий</button>
            <button id="resetBtn">🔄 Сброс статистики</button>
        </div>
        <div class="result">
            <div class="score" id="scorePercent">— %</div>
            <div class="accuracy-bar"><div class="fill-bar" id="fillBar"></div></div>
            <div class="feedback" id="feedbackMsg">Готов к ответу</div>
            <div class="stats">
                <span>✅ Верно: <span id="correctCount">0</span></span>
                <span>❌ Неверно: <span id="wrongCount">0</span></span>
                <span>📋 Всего: <span id="totalCount">0</span></span>
            </div>
        </div>
    </div>
    <footer>Правильный ответ должен совпадать с точностью до регистра и знаков препинания. Режим «Вперемешку» берёт вопросы из всех разделов.</footer>
</div>

<script>
    // ======================= БАЗА ДАННЫХ =======================
    const database = {
        "Механика": [
            { term: "Материальная точка", def: "Тело, размерами и формой которого в условиях данной задачи можно пренебречь." },
            { term: "Поступательное движение", def: "Движение, при котором любая прямая, связанная с телом, перемещается параллельно самой себе." },
            { term: "Траектория", def: "Линия, которую описывает материальная точка при движении." },
            { term: "Путь", def: "Скалярная величина, равная длине траектории." },
            { term: "Перемещение", def: "Вектор, соединяющий начальное и конечное положение точки." },
            { term: "Скорость", def: "Векторная величина, равная производной радиус-вектора по времени." },
            { term: "Ускорение", def: "Векторная величина, равная производной скорости по времени." },
            { term: "Тангенциальное ускорение", def: "Составляющая ускорения, направленная по касательной к траектории; меняет модуль скорости." },
            { term: "Нормальное ускорение", def: "Составляющая ускорения, направленная к центру кривизны; меняет направление скорости." },
            { term: "Импульс тела", def: "Векторная величина, равная произведению массы на скорость." },
            { term: "Замкнутая система", def: "Система тел, на которую не действуют внешние силы." },
            { term: "Закон сохранения импульса", def: "В замкнутой системе векторная сумма импульсов тел постоянна." },
            { term: "Абсолютно упругий удар", def: "Удар, при котором сохраняется механическая энергия системы." },
            { term: "Абсолютно неупругий удар", def: "Удар, после которого тела движутся вместе; механическая энергия не сохраняется." },
            { term: "Механическая работа", def: "Скаляр, равный произведению силы на перемещение и косинус угла между ними." },
            { term: "Кинетическая энергия", def: "Энергия движения, равная mv²/2." },
            { term: "Потенциальная энергия", def: "Энергия взаимодействия тел, зависящая от их взаимного расположения." },
            { term: "Закон сохранения механической энергии", def: "В замкнутой системе с консервативными силами полная механическая энергия постоянна." },
            { term: "Инерциальная система отсчёта", def: "Система, в которой тело без внешних сил движется равномерно или покоится." },
            { term: "Сила трения скольжения", def: "Сила, возникающая при движении одного тела по другому, равная μN." },
            { term: "Сила упругости", def: "Сила, возникающая при деформации и стремящаяся вернуть форму; F = -kx." }
        ],
        "МКТ и термодинамика": [
            { term: "Идеальный газ", def: "Модель газа, где пренебрегают размерами молекул и их взаимодействием на расстоянии." },
            { term: "Изотермический процесс", def: "Процесс при постоянной температуре (PV = const)." },
            { term: "Изобарный процесс", def: "Процесс при постоянном давлении (V/T = const)." },
            { term: "Изохорный процесс", def: "Процесс при постоянном объёме (P/T = const)." },
            { term: "Уравнение состояния идеального газа", def: "PV = (m/M)RT — уравнение Менделеева-Клапейрона." },
            { term: "Абсолютный нуль", def: "Температура 0 К, при которой прекращается поступательное движение молекул." },
            { term: "Средняя кинетическая энергия молекулы", def: "Для одноатомного газа равна (3/2)kT." },
            { term: "Число степеней свободы", def: "Число независимых координат, определяющих положение системы." },
            { term: "Внутренняя энергия идеального газа", def: "Сумма кинетических энергий всех молекул." },
            { term: "Первое начало термодинамики", def: "Q = ΔU + A — теплота идёт на изменение энергии и работу." },
            { term: "Адиабатный процесс", def: "Процесс без теплообмена с окружающей средой (Q = 0)." },
            { term: "Формула Майера", def: "Cp - Cv = R." },
            { term: "Тепловой двигатель", def: "Устройство, превращающее внутреннюю энергию в механическую работу." },
            { term: "Цикл Карно", def: "Обратимый цикл из двух изотерм и двух адиабат." },
            { term: "КПД цикла Карно", def: "η = 1 - T₂/T₁." }
        ],
        "Электричество": [
            { term: "Закон Кулона", def: "Сила взаимодействия зарядов пропорциональна произведению зарядов и обратно пропорциональна квадрату расстояния." },
            { term: "Напряжённость электрического поля", def: "Силовая характеристика поля, E = F/q." },
            { term: "Принцип суперпозиции полей", def: "Напряжённость результирующего поля равна векторной сумме напряжённостей отдельных полей." },
            { term: "Поток вектора напряжённости", def: "Произведение E на площадь и косинус угла." },
            { term: "Теорема Гаусса", def: "Поток E через замкнутую поверхность равен суммарному заряду внутри, делённому на ε₀." },
            { term: "Потенциал электрического поля", def: "Энергетическая характеристика поля, равная потенциальной энергии единичного заряда." },
            { term: "Электроёмкость", def: "Способность проводника накапливать заряд, C = q/φ." },
            { term: "Плоский конденсатор", def: "Две параллельные пластины с диэлектриком; ёмкость C = εε₀S/d." }
        ],
        "Магнетизм": [
            { term: "Вектор магнитной индукции", def: "Силовая характеристика магнитного поля." },
            { term: "Сила Ампера", def: "Сила, действующая на проводник с током в магнитном поле: F = BIL sinα." },
            { term: "Сила Лоренца", def: "Сила, действующая на заряд в магнитном поле: F = qvB sinα." },
            { term: "Закон электромагнитной индукции", def: "ЭДС индукции равна скорости изменения магнитного потока со знаком минус." },
            { term: "Правило Ленца", def: "Индукционный ток направлен так, чтобы противодействовать изменению магнитного потока." },
            { term: "ЭДС самоиндукции", def: "ЭДС, возникающая в контуре при изменении собственного тока." },
            { term: "Индуктивность", def: "Характеристика контура, определяющая его способность создавать потокосцепление." }
        ],
        "Колебания": [
            { term: "Гармонические колебания", def: "Колебания по закону синуса или косинуса." },
            { term: "Амплитуда колебаний", def: "Максимальное отклонение от положения равновесия." },
            { term: "Период колебаний", def: "Время одного полного колебания." },
            { term: "Частота колебаний", def: "Число колебаний за 1 секунду." },
            { term: "Математический маятник", def: "Материальная точка на невесомой нерастяжимой нити." },
            { term: "Пружинный маятник", def: "Груз на пружине." },
            { term: "Биения", def: "Периодическое изменение амплитуды при сложении колебаний с близкими частотами." }
        ]
    };

    // ---- Глобальные переменные ----
    let currentMode = "def_to_term";
    let currentTopic = "Механика";
    let shuffleMode = false;
    let currentItem = null;
    let stats = { correct: 0, wrong: 0 };

    // ---- ЧИСТАЯ НОРМАЛИЗАЦИЯ (только регистр и незначащие пробелы) ----
    function normalize(str) {
        return str.toLowerCase().trim().replace(/\s+/g, " ");
    }

    // ---- ТОЧНАЯ ПРОВЕРКА (без либеральных совпадений) ----
    function isAnswerCorrect(userAnswer, correctAnswer) {
        return normalize(userAnswer) === normalize(correctAnswer);
    }

    // ---- Получить случайный вопрос ----
    function getRandomQuestion() {
        let items = [];
        if (shuffleMode) {
            for (let [topicName, arr] of Object.entries(database)) {
                for (let item of arr) {
                    items.push({ ...item, topic: topicName });
                }
            }
        } else {
            const topicData = database[currentTopic];
            if (!topicData) return null;
            items = topicData.map(item => ({ ...item, topic: currentTopic }));
        }
        if (items.length === 0) return null;
        const randomIndex = Math.floor(Math.random() * items.length);
        return items[randomIndex];
    }

    // ---- Обновить интерфейс ----
    function updateUI() {
        if (!currentItem) {
            currentItem = getRandomQuestion();
            if (!currentItem) return;
        }
        
        const questionDiv = document.getElementById("questionText");
        const topicName = shuffleMode ? currentItem.topic : currentTopic;
        
        if (currentMode === "def_to_term") {
            questionDiv.innerHTML = `📖 <span style="font-weight:normal">[${topicName}]</span><br>📌 Определение:<br>«${currentItem.def}»<br><span style="font-size:0.9rem;">✍️ Напишите ТЕРМИН</span>`;
        } else {
            questionDiv.innerHTML = `📝 <span style="font-weight:normal">[${topicName}]</span><br>📌 Термин:<br>«${currentItem.term}»<br><span style="font-size:0.9rem;">✍️ Напишите ОПРЕДЕЛЕНИЕ</span>`;
        }
        
        const total = stats.correct + stats.wrong;
        const percent = total === 0 ? 0 : (stats.correct / total) * 100;
        document.getElementById("scorePercent").innerText = Math.round(percent) + "%";
        document.getElementById("fillBar").style.width = percent + "%";
        document.getElementById("correctCount").innerText = stats.correct;
        document.getElementById("wrongCount").innerText = stats.wrong;
        document.getElementById("totalCount").innerText = total;
    }

    // ---- Проверка ответа (исправлена) ----
    function checkAnswer() {
        const userAnswer = document.getElementById("answerInput").value.trim();
        if (!userAnswer) {
            document.getElementById("feedbackMsg").innerHTML = "<span class='wrong-feedback'>✏️ Введите ответ!</span>";
            return;
        }
        if (!currentItem) {
            nextQuestion();
            return;
        }
        
        let isCorrect = false;
        let correctAnswer = "";
        
        if (currentMode === "def_to_term") {
            correctAnswer = currentItem.term;
            isCorrect = isAnswerCorrect(userAnswer, correctAnswer);
        } else {
            correctAnswer = currentItem.def;
            isCorrect = isAnswerCorrect(userAnswer, correctAnswer);
        }
        
        if (isCorrect) {
            stats.correct++;
            document.getElementById("feedbackMsg").innerHTML = `<span class='correct-feedback'>✅ Верно!</span>`;
        } else {
            stats.wrong++;
            document.getElementById("feedbackMsg").innerHTML = `<span class='wrong-feedback'>❌ Неверно. Правильный ответ: "${correctAnswer}"</span>`;
        }
        
        updateUI();
        document.getElementById("answerInput").value = "";
        
        // Авто-следующий вопрос через 1 секунду
        setTimeout(() => {
            nextQuestion();
        }, 1000);
    }
    
    function nextQuestion() {
        currentItem = getRandomQuestion();
        updateUI();
        document.getElementById("answerInput").value = "";
        document.getElementById("feedbackMsg").innerHTML = "Введите ответ...";
    }
    
    function resetStats() {
        stats.correct = 0;
        stats.wrong = 0;
        updateUI();
        document.getElementById("feedbackMsg").innerHTML = "📊 Статистика сброшена.";
    }
    
    // ---- Кнопки разделов ----
    function renderTopicButtons() {
        const container = document.getElementById("topicSelector");
        container.innerHTML = "";
        const topics = Object.keys(database);
        topics.forEach(topic => {
            const btn = document.createElement("button");
            btn.className = "topic-btn" + (currentTopic === topic && !shuffleMode ? " active" : "");
            btn.innerText = topic;
            btn.addEventListener("click", () => {
                if (shuffleMode) {
                    shuffleMode = false;
                    document.getElementById("shuffleBtn").style.background = "#475569";
                }
                currentTopic = topic;
                currentItem = getRandomQuestion();
                updateUI();
                document.querySelectorAll(".topic-btn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                document.getElementById("feedbackMsg").innerHTML = `Раздел: ${topic}`;
            });
            container.appendChild(btn);
        });
    }
    
    // ---- Переключатель режимов ----
    function initModeButtons() {
        const modeBtns = document.querySelectorAll(".mode-btn");
        modeBtns.forEach(btn => {
            btn.addEventListener("click", () => {
                modeBtns.forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                currentMode = btn.getAttribute("data-mode");
                currentItem = getRandomQuestion();
                updateUI();
                document.getElementById("feedbackMsg").innerHTML = `Режим: ${currentMode === "def_to_term" ? "Определение → Термин" : "Термин → Определение"}`;
            });
        });
    }
    
    // ---- Режим "Вперемешку" ----
    function setupShuffle() {
        const shuffleBtn = document.getElementById("shuffleBtn");
        shuffleBtn.addEventListener("click", () => {
            shuffleMode = !shuffleMode;
            if (shuffleMode) {
                shuffleBtn.style.background = "#3b82f6";
                document.querySelectorAll(".topic-btn").forEach(b => b.classList.remove("active"));
            } else {
                shuffleBtn.style.background = "#475569";
                const activeTopicBtn = Array.from(document.querySelectorAll(".topic-btn")).find(b => b.innerText === currentTopic);
                if (activeTopicBtn) activeTopicBtn.classList.add("active");
            }
            currentItem = getRandomQuestion();
            updateUI();
            document.getElementById("feedbackMsg").innerHTML = shuffleMode ? "🎲 Режим «Вперемешку»" : "📁 Режим по разделам";
        });
    }
    
    // ---- Запуск ----
    function init() {
        renderTopicButtons();
        initModeButtons();
        setupShuffle();
        currentItem = getRandomQuestion();
        updateUI();
        document.getElementById("checkBtn").addEventListener("click", checkAnswer);
        document.getElementById("nextBtn").addEventListener("click", nextQuestion);
        document.getElementById("resetBtn").addEventListener("click", resetStats);
        document.getElementById("answerInput").addEventListener("keypress", (e) => {
            if (e.key === "Enter") checkAnswer();
        });
    }
    init();
</script>
</body>
</html>
