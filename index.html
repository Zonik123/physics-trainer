<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Физика: Тренажёр определений</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Roboto', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .card {
            max-width: 800px;
            width: 100%;
            background: rgba(255,255,255,0.95);
            border-radius: 48px;
            padding: 30px 28px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
            transition: all 0.2s;
        }
        h1 {
            font-size: 1.8rem;
            margin: 0 0 8px 0;
            color: #0f172a;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .sub {
            color: #334155;
            border-left: 3px solid #3b82f6;
            padding-left: 14px;
            margin-bottom: 24px;
            font-weight: 500;
        }
        .topic-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 28px;
            background: #f1f5f9;
            padding: 12px 16px;
            border-radius: 60px;
        }
        .topic-btn {
            background: transparent;
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            color: #1e293b;
            font-size: 0.9rem;
        }
        .topic-btn.active {
            background: #3b82f6;
            color: white;
            box-shadow: 0 6px 12px -6px #3b82f680;
        }
        .question-panel {
            background: #f8fafc;
            border-radius: 32px;
            padding: 30px 24px;
            margin-bottom: 28px;
            border: 1px solid #e2e8f0;
        }
        .definition {
            font-size: 1.6rem;
            font-weight: 600;
            line-height: 1.4;
            color: #0f172a;
            margin-bottom: 28px;
            background: white;
            padding: 24px;
            border-radius: 28px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }
        input {
            width: 100%;
            padding: 16px 20px;
            font-size: 1rem;
            border: 2px solid #cbd5e1;
            border-radius: 48px;
            outline: none;
            transition: 0.2s;
            background: white;
        }
        input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px #3b82f620;
        }
        .button-group {
            display: flex;
            gap: 14px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        button {
            background: #1e293b;
            border: none;
            color: white;
            padding: 12px 22px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
        }
        button.primary {
            background: #3b82f6;
        }
        button.primary:hover {
            background: #2563eb;
            transform: scale(0.97);
        }
        .result {
            margin-top: 24px;
            background: #eef2ff;
            border-radius: 28px;
            padding: 20px;
            text-align: center;
        }
        .score {
            font-size: 2.2rem;
            font-weight: 800;
            color: #3b82f6;
        }
        .accuracy-bar {
            background: #cbd5e1;
            border-radius: 40px;
            height: 12px;
            width: 100%;
            margin: 12px 0;
            overflow: hidden;
        }
        .fill-bar {
            background: #3b82f6;
            width: 0%;
            height: 100%;
            border-radius: 40px;
            transition: width 0.2s;
        }
        .feedback {
            font-weight: 500;
            margin-top: 12px;
        }
        .correct-feedback { color: #15803d; }
        .wrong-feedback { color: #b91c1c; }
        .stats {
            display: flex;
            justify-content: space-between;
            margin-top: 16px;
            font-size: 0.9rem;
            color: #334155;
        }
        footer {
            font-size: 0.75rem;
            text-align: center;
            margin-top: 30px;
            color: #64748b;
        }
        @media (max-width: 550px) {
            .definition { font-size: 1.2rem; }
            .card { padding: 20px; }
        }
    </style>
</head>
<body>
<div class="card">
    <h1>📚 Физика: термины</h1>
    <div class="sub">Напиши термин по определению • точность в %</div>

    <div class="topic-selector" id="topicSelector"></div>

    <div class="question-panel">
        <div class="definition" id="definitionText">Загрузка...</div>
        <input type="text" id="answerInput" placeholder="Введите ответ..." autocomplete="off">
        <div class="button-group">
            <button class="primary" id="checkBtn">✅ Проверить</button>
            <button id="nextBtn">🎲 Следующий вопрос</button>
            <button id="resetTopicBtn">🔄 Сбросить прогресс по разделу</button>
        </div>
        <div class="result" id="resultPanel">
            <div class="score" id="scorePercent">— %</div>
            <div class="accuracy-bar"><div class="fill-bar" id="fillBar"></div></div>
            <div class="feedback" id="feedbackMsg">Нажми «Проверить»</div>
            <div class="stats">
                <span>📊 Верно: <span id="correctCount">0</span></span>
                <span>❌ Неверно: <span id="wrongCount">0</span></span>
                <span>📋 Всего: <span id="totalCount">0</span></span>
            </div>
        </div>
    </div>
    <footer>⭐ Сравнение идёт без учёта падежей — оценивается смысловое ядро. Будь максимально точен.</footer>
</div>

<script>
    // --------------------------------------------------------------
    // БАЗА ДАННЫХ: разделы + определения (термин: описание)
    // --------------------------------------------------------------
    const database = {
        "Механика": [
            { term: "Материальная точка", desc: "Тело, размерами и формой которого в условиях данной задачи можно пренебречь, но обладающее массой." },
            { term: "Поступательное движение", desc: "Движение, при котором любая прямая, связанная с телом, перемещается параллельно самой себе." },
            { term: "Траектория", desc: "Линия, которую описывает материальная точка при своем движении." },
            { term: "Путь", desc: "Скалярная величина, равная длине траектории, пройденной точкой за время." },
            { term: "Перемещение", desc: "Вектор, соединяющий начальное и конечное положение материальной точки." },
            { term: "Скорость", desc: "Векторная величина, характеризующая быстроту перемещения и направление движения; производная радиус-вектора по времени." },
            { term: "Ускорение", desc: "Векторная величина, характеризующая быстроту изменения скорости; производная скорости по времени." },
            { term: "Тангенциальное ускорение", desc: "Составляющая ускорения, направленная по касательной к траектории; характеризует изменение модуля скорости." },
            { term: "Нормальное ускорение", desc: "Составляющая ускорения, направленная к центру кривизны траектории; характеризует изменение направления скорости." },
            { term: "Импульс тела", desc: "Векторная величина, равная произведению массы тела на его скорость." },
            { term: "Замкнутая система", desc: "Система тел, на которую не действуют внешние силы (или их равнодействующая равна нулю)." },
            { term: "Закон сохранения импульса", desc: "В замкнутой системе векторная сумма импульсов всех тел остаётся постоянной." },
            { term: "Абсолютно упругий удар", desc: "Удар, при котором сохраняется механическая энергия системы; тела после удара движутся раздельно." },
            { term: "Абсолютно неупругий удар", desc: "Удар, после которого тела движутся вместе с одинаковой скоростью; механическая энергия не сохраняется." },
            { term: "Механическая работа", desc: "Скалярная величина, равная произведению силы на перемещение и косинус угла между ними." },
            { term: "Кинетическая энергия", desc: "Энергия механического движения тела, равная mv²/2." },
            { term: "Потенциальная энергия", desc: "Энергия, обусловленная взаимодействием тел и зависящая от их взаимного расположения." },
            { term: "Закон сохранения механической энергии", desc: "В замкнутой системе с консервативными силами полная механическая энергия сохраняется." },
            { term: "Инерциальная система отсчёта", desc: "Система отсчёта, в которой тело, не подверженное действию внешних сил, покоится или движется равномерно прямолинейно." },
            { term: "Сила трения скольжения", desc: "Сила, возникающая при движении одного тела по поверхности другого, равная μN и направленная против движения." },
            { term: "Сила упругости", desc: "Сила, возникающая при деформации и стремящаяся восстановить форму; подчиняется закону Гука F = -kx." }
        ],
        "МКТ и термодинамика": [
            { term: "Идеальный газ", desc: "Модель газа, в которой пренебрегают размерами молекул и их взаимодействием на расстоянии, учитывая только упругие столкновения." },
            { term: "Изотермический процесс", desc: "Процесс изменения состояния газа при постоянной температуре (T = const, PV = const)." },
            { term: "Изобарный процесс", desc: "Процесс при постоянном давлении (P = const, V/T = const)." },
            { term: "Изохорный процесс", desc: "Процесс при постоянном объёме (V = const, P/T = const)." },
            { term: "Уравнение состояния идеального газа", desc: "Уравнение Менделеева-Клапейрона PV = (m/M)RT, связывающее давление, объём и температуру." },
            { term: "Абсолютный нуль", desc: "Температура T = 0 К, при которой прекращается поступательное движение молекул." },
            { term: "Средняя кинетическая энергия молекулы", desc: "Для одноатомного газа равна (3/2)kT, где k — постоянная Больцмана." },
            { term: "Число степеней свободы", desc: "Число независимых координат, определяющих положение системы в пространстве." },
            { term: "Внутренняя энергия идеального газа", desc: "Сумма кинетических энергий всех молекул; U = (m/M)·(i/2)·RT." },
            { term: "Первое начало термодинамики", desc: "Количество теплоты, переданное системе, идёт на изменение внутренней энергии и совершение работы: Q = ΔU + A." },
            { term: "Адиабатный процесс", desc: "Процесс без теплообмена с окружающей средой (Q = 0)." },
            { term: "Формула Майера", desc: "Связь молярных теплоёмкостей: Cp - Cv = R." },
            { term: "Тепловой двигатель", desc: "Устройство, преобразующее внутреннюю энергию топлива в механическую работу." },
            { term: "Цикл Карно", desc: "Обратимый круговой процесс, состоящий из двух изотерм и двух адиабат." },
            { term: "КПД цикла Карно", desc: "η = 1 - T₂/T₁, где T₁ — температура нагревателя, T₂ — холодильника." }
        ],
        "Электричество": [
            { term: "Закон Кулона", desc: "Сила взаимодействия двух точечных зарядов пропорциональна произведению зарядов и обратно пропорциональна квадрату расстояния между ними." },
            { term: "Напряжённость электрического поля", desc: "Векторная величина, равная отношению силы, действующей на пробный заряд, к этому заряду: E = F/q." },
            { term: "Принцип суперпозиции полей", desc: "Напряжённость результирующего поля равна векторной сумме напряжённостей отдельных полей." },
            { term: "Поток вектора напряжённости", desc: "Скалярная величина, равная произведению модуля напряжённости на площадь и косинус угла." },
            { term: "Теорема Гаусса", desc: "Поток вектора напряжённости через замкнутую поверхность равен суммарному заряду внутри, делённому на ε₀." },
            { term: "Потенциал электрического поля", desc: "Энергетическая характеристика поля, равная потенциальной энергии единичного положительного заряда." },
            { term: "Электроёмкость", desc: "Способность проводника накапливать заряд; C = q/φ." },
            { term: "Плоский конденсатор", desc: "Система из двух параллельных пластин, разделённых диэлектриком; ёмкость C = εε₀S/d." }
        ],
        "Магнетизм": [
            { term: "Вектор магнитной индукции", desc: "Силовая характеристика магнитного поля, определяющая силу, действующую на движущийся заряд." },
            { term: "Сила Ампера", desc: "Сила, действующая на проводник с током в магнитном поле: F = BIL sinα." },
            { term: "Сила Лоренца", desc: "Сила, действующая на движущуюся заряженную частицу в магнитном поле: F = qvB sinα." },
            { term: "Закон электромагнитной индукции", desc: "ЭДС индукции равна скорости изменения магнитного потока, взятой с обратным знаком: E = -dΦ/dt." },
            { term: "Правило Ленца", desc: "Индукционный ток направлен так, чтобы противодействовать изменению магнитного потока, его вызвавшему." },
            { term: "ЭДС самоиндукции", desc: "ЭДС, возникающая в контуре при изменении собственного тока; E = -L·dI/dt." },
            { term: "Индуктивность", desc: "Физическая величина, характеризующая способность контура создавать потокосцепление при протекании тока." }
        ],
        "Колебания": [
            { term: "Гармонические колебания", desc: "Колебания, при которых физическая величина изменяется по закону синуса или косинуса." },
            { term: "Амплитуда колебаний", desc: "Максимальное отклонение колеблющейся величины от положения равновесия." },
            { term: "Период колебаний", desc: "Время одного полного колебания." },
            { term: "Частота колебаний", desc: "Число колебаний за единицу времени." },
            { term: "Математический маятник", desc: "Материальная точка, подвешенная на невесомой нерастяжимой нити." },
            { term: "Пружинный маятник", desc: "Груз на пружине, совершающий колебания под действием силы упругости." },
            { term: "Биения", desc: "Периодическое изменение амплитуды при сложении двух колебаний с близкими частотами." }
        ]
    };

    // ----- СОСТОЯНИЕ -----
    let currentTopic = "Механика";
    let currentQuestion = null;
    let currentTerm = "";
    let stats = {
        correct: 0,
        wrong: 0
    };

    // вспомогательная нормализация (сравнение без чувствительности к регистру и окончаниям)
    function normalize(str) {
        return str.toLowerCase()
            .replace(/ё/g, "е")
            .replace(/[-‑—–]/g, " ")
            .replace(/[^\w\s]/g, "")
            .replace(/\s+/g, " ")
            .trim();
    }

    function isAnswerCorrect(userAnswer, term) {
        const normUser = normalize(userAnswer);
        const normTerm = normalize(term);
        // точное совпадение после нормализации
        if (normUser === normTerm) return true;
        // дополнительно: если пользователь написал, например, "закон сохранения импульса" вместо "Закон сохранения импульса"
        if (normTerm.includes(normUser) && normUser.length > 3) return true;
        if (normUser.includes(normTerm)) return true;
        return false;
    }

    function getRandomQuestion() {
        const topicData = database[currentTopic];
        if (!topicData || topicData.length === 0) return null;
        const randomIndex = Math.floor(Math.random() * topicData.length);
        return topicData[randomIndex];
    }

    function updateUI() {
        if (!currentQuestion) {
            currentQuestion = getRandomQuestion();
        }
        if (currentQuestion) {
            document.getElementById("definitionText").innerText = currentQuestion.desc;
            currentTerm = currentQuestion.term;
        } else {
            document.getElementById("definitionText").innerText = "Нет определений в этом разделе";
        }
        // обновляем статистику на экране
        document.getElementById("correctCount").innerText = stats.correct;
        document.getElementById("wrongCount").innerText = stats.wrong;
        const total = stats.correct + stats.wrong;
        document.getElementById("totalCount").innerText = total;
        let percent = 0;
        if (total > 0) percent = (stats.correct / total) * 100;
        document.getElementById("scorePercent").innerText = Math.round(percent) + "%";
        document.getElementById("fillBar").style.width = percent + "%";
    }

    function checkAnswer() {
        const inputField = document.getElementById("answerInput");
        const userAnswer = inputField.value.trim();
        if (!userAnswer) {
            document.getElementById("feedbackMsg").innerHTML = "<span class='wrong-feedback'>✏️ Введи термин!</span>";
            return;
        }
        if (!currentQuestion) {
            document.getElementById("feedbackMsg").innerHTML = "<span class='wrong-feedback'>Нет активного вопроса</span>";
            return;
        }
        const isCorrect = isAnswerCorrect(userAnswer, currentTerm);
        if (isCorrect) {
            stats.correct++;
            document.getElementById("feedbackMsg").innerHTML = "<span class='correct-feedback'>✅ Верно! Отлично.</span>";
        } else {
            stats.wrong++;
            document.getElementById("feedbackMsg").innerHTML = `<span class='wrong-feedback'>❌ Неверно. Правильный ответ: <strong>${currentTerm}</strong></span>`;
        }
        updateUI();
        // очистка поля и переход к следующему вопросу (удобно)
        inputField.value = "";
        currentQuestion = getRandomQuestion();
        updateUI();   // обновит текст нового определения
        document.getElementById("feedbackMsg").scrollIntoView({ behavior: "smooth", block: "nearest" });
    }

    function nextQuestion() {
        document.getElementById("answerInput").value = "";
        currentQuestion = getRandomQuestion();
        updateUI();
        document.getElementById("feedbackMsg").innerHTML = "Новый вопрос. Введите ответ.";
    }

    function resetTopicProgress() {
        stats.correct = 0;
        stats.wrong = 0;
        currentQuestion = getRandomQuestion();
        updateUI();
        document.getElementById("answerInput").value = "";
        document.getElementById("feedbackMsg").innerHTML = "Прогресс по разделу сброшен. Начни заново!";
    }

    function renderTopicButtons() {
        const container = document.getElementById("topicSelector");
        container.innerHTML = "";
        const topics = Object.keys(database);
        topics.forEach(topic => {
            const btn = document.createElement("button");
            btn.className = "topic-btn" + (currentTopic === topic ? " active" : "");
            btn.innerText = topic;
            btn.addEventListener("click", () => {
                currentTopic = topic;
                // сброс статистики при смене раздела (опционально, но логично для чистоты тренировки)
                stats.correct = 0;
                stats.wrong = 0;
                currentQuestion = getRandomQuestion();
                document.getElementById("answerInput").value = "";
                document.getElementById("feedbackMsg").innerHTML = `Раздел: ${topic}. Введи термин.`;
                updateUI();
                // обновить активную кнопку
                document.querySelectorAll(".topic-btn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
            });
            container.appendChild(btn);
        });
    }

    // инициализация
    function init() {
        renderTopicButtons();
        currentQuestion = getRandomQuestion();
        updateUI();
        document.getElementById("checkBtn").addEventListener("click", checkAnswer);
        document.getElementById("nextBtn").addEventListener("click", nextQuestion);
        document.getElementById("resetTopicBtn").addEventListener("click", resetTopicProgress);
        document.getElementById("answerInput").addEventListener("keypress", (e) => {
            if (e.key === "Enter") checkAnswer();
        });
    }

    init();
</script>
</body>
</html>
